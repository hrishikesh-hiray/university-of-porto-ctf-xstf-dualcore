[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:flask]
command=python3 /app/backend/app.py
directory=/app/backend
environment=PYTHONUNBUFFERED="1",FLAG="%(ENV_FLAG)s",ADMIN_PASSWORD="%(ENV_ADMIN_PASSWORD)s",BOT_URL="http://127.0.0.1:8000",WEB_URL="http://127.0.0.1:5001"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/flask.log
stderr_logfile=/var/log/supervisor/flask.log

[program:react]
command=npm start
directory=/app/frontend
environment=PORT="3000",HOST="0.0.0.0",BROWSER="none",CI="false",CHOKIDAR_USEPOLLING="true",DANGEROUSLY_DISABLE_HOST_CHECK="true",WDS_SOCKET_PORT="0"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/react.log
stderr_logfile=/var/log/supervisor/react.log

[program:bot]
command=node /bot/bot.js
directory=/bot
environment=FLAG="%(ENV_FLAG)s",WEB_URL="http://127.0.0.1:5001",ADMIN_PASSWORD="%(ENV_ADMIN_PASSWORD)s"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/bot.log
stderr_logfile=/var/log/supervisor/bot.log

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/supervisor/nginx.log
stderr_logfile=/var/log/supervisor/nginx.log

<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Media Meeting - Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#3713ec", "background-dark": "#131022", "surface-dark": "#1e1b2e" },
                    fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] },
                    boxShadow: { "glow": "0 0 20px rgba(55, 19, 236, 0.5)" }
                },
            },
        }
    </script>
    <style>
        .glass-panel { background: rgba(30, 27, 46, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-white font-display overflow-hidden h-screen flex flex-col">

<header class="w-full z-50 px-4 py-4 md:px-8">
    <div class="glass-panel rounded-xl px-4 py-3 md:px-6 flex flex-col md:flex-row items-center justify-between gap-4 shadow-lg">
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="flex items-center justify-center size-10 rounded-lg bg-primary/20 text-primary">
                <span class="material-symbols-outlined text-2xl">casino</span>
            </div>
            <div>
                <h1 class="text-sm font-bold uppercase tracking-wider text-slate-400">Media Meeting</h1>
                <p class="text-white font-extrabold text-lg leading-none">DON'T MISS IT</p>
            </div>
        </div>
        
        <div class="flex-1 w-full max-w-lg flex flex-col gap-2">
            <div class="flex justify-between items-end px-1">
                <span class="text-xs font-bold uppercase tracking-widest text-primary">Jackpot Score</span>
                <span class="text-sm font-bold tabular-nums"><span id="score">0</span> <span class="text-slate-500">/ 777</span></span>
            </div>
            <div class="h-3 w-full bg-slate-800 rounded-full overflow-hidden border border-white/5 relative">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-600 to-primary shadow-[0_0_10px_rgba(55,19,236,0.8)] relative opacity-50" style="width: 0%;"></div>
            </div>
        </div>

        <div class="hidden md:flex items-center gap-3">
            <div class="flex items-center gap-2 bg-slate-800/50 rounded-lg px-3 py-1.5 border border-white/5">
                <span class="material-symbols-outlined text-yellow-400 text-lg">lightbulb</span>
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase text-slate-400 font-bold leading-none">Hints</span>
                    <span id="hints" class="text-sm font-bold leading-none">1</span>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="flex-1 relative px-4 md:px-8 pb-4 min-h-0 flex flex-col">
    <div class="relative w-full h-full rounded-2xl overflow-hidden shadow-2xl border border-white/10 group">
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-[2s] group-hover:scale-105" style="background-image: url('/static/images/zinada.jpeg');">
            <div class="absolute inset-0 bg-background-dark/30 backdrop-blur-[1px]"></div>
            <div class="absolute inset-0 bg-gradient-to-b from-background-dark/80 via-transparent to-background-dark/90"></div>
        </div>

        <div id="game-status" class="hidden absolute top-10 left-0 right-0 mx-auto w-fit px-6 py-2 rounded-lg bg-black/80 text-white font-bold border border-white/20 z-30">
        </div>
        
        <div id="flag-box" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md">
             <div class="text-center p-10 border border-primary/50 rounded-2xl bg-surface-dark shadow-glow">
                <h3 class="text-4xl font-black text-yellow-400 mb-4">🎉 JACKPOT! 🎉</h3>
                <p id="flag" class="text-xl font-mono text-white bg-black/50 p-4 rounded border border-white/10 select-all"></p>
             </div>
        </div>

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="relative z-10 flex flex-col items-center gap-2 animate-bounce" style="animation-duration: 2s;">
                <div class="size-16 md:size-24 bg-white/10 backdrop-blur-sm border-2 border-primary rounded-xl flex items-center justify-center shadow-glow">
                    <span class="material-symbols-outlined text-4xl text-white">person_filled</span>
                </div>
                <div id="player-name" class="px-3 py-1 bg-black/60 rounded-full text-xs font-bold text-white border border-white/10">You</div>
            </div>
        </div>

        <div class="absolute bottom-6 left-0 right-0 flex flex-col items-center justify-center z-20 pointer-events-auto">
            <button onclick="askOracle()" class="flex items-center gap-2 px-5 py-2.5 rounded-full bg-surface-dark/90 border border-primary/30 text-primary hover:bg-primary hover:text-white transition-all duration-300 shadow-lg group/hint cursor-pointer">
                <span class="material-symbols-outlined text-lg group-hover/hint:animate-pulse">help</span>
                <span class="text-sm font-bold tracking-wide">Ask for Guidance</span>
            </button>
            <p>And wait a bit (~3s) admin needs to check the slot odds</p>
        </div>
    </div>
</main>

<footer id="game-controls" class="w-full px-4 pb-6 md:pb-8 pt-2">
    <div class="max-w-3xl mx-auto w-full">
        <div class="flex items-center gap-4 md:gap-6 justify-center">
            <button onclick="playMove('wait')" class="group relative flex-1 max-w-[240px] h-16 md:h-20 rounded-xl bg-[#2b2839] border-b-4 border-[#1a1823] hover:border-b-0 hover:translate-y-1 active:scale-95 transition-all flex items-center justify-center cursor-pointer">
                <div class="flex flex-col items-center gap-0.5">
                    <span class="text-lg md:text-xl font-black tracking-widest text-slate-400 group-hover:text-white transition-colors">WAIT</span>
                    <div class="h-1 w-8 rounded-full bg-slate-600 group-hover:bg-slate-500"></div>
                </div>
            </button>
            
            <button onclick="playMove('cross')" class="group relative flex-[1.5] max-w-[320px] h-16 md:h-20 rounded-xl bg-primary border-b-4 border-[#220ba3] hover:border-b-0 hover:translate-y-1 active:scale-95 transition-all flex items-center justify-center shadow-glow cursor-pointer">
                <div class="relative flex items-center gap-3">
                    <span class="material-symbols-outlined text-white text-3xl md:text-4xl animate-pulse">fast_forward</span>
                    <div class="flex flex-col items-start leading-none">
                        <span class="text-2xl md:text-3xl font-black tracking-widest text-white drop-shadow-md">CROSS</span>
                    </div>
                </div>
            </button>
        </div>
    </div>
</footer>

<script>
    async function updateState() {
        const res = await fetch('/api/me');
        const data = await res.json();
        document.getElementById('score').innerText = data.score;
        document.getElementById('hints').innerText = data.hints;
        document.getElementById('player-name').innerText = data.username;
        
        const percentage = (data.score / 777) * 100;
        document.getElementById('progress-bar').style.width = `${percentage}%`;
        
        if (data.flag) {
            document.getElementById('flag-box').classList.remove('hidden');
            document.getElementById('flag').innerText = data.flag;
            document.getElementById('game-controls').classList.add('hidden');
        }
    }

    async function playMove(action) {
        const statusDiv = document.getElementById('game-status');
        const res = await fetch('/api/play', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action })
        });

        if (!res.ok) {
            let msg = `Erro ${res.status}`;
            try {
                const j = await res.json();
                msg = j.error || j.msg || msg;
            } catch (_) {}
            statusDiv.style.color = '#ef4444';
            statusDiv.style.borderColor = '#ef4444';
            statusDiv.innerText = msg;
            statusDiv.classList.remove('hidden');           
            if (res.status === 401) {
                setTimeout(() => window.location.href = 'index.html', 1200);
            }
            return;
        }

        const data = await res.json();

        if (data.status === 'safe') {
            statusDiv.style.color = '#4ade80';
            statusDiv.style.borderColor = '#4ade80';
            statusDiv.innerText = `✅ Safe! +${data.gained} points`;
            statusDiv.classList.remove('hidden');
            setTimeout(() => statusDiv.classList.add('hidden'), 3000);
        } else if (data.status === 'fail') {
            window.location.href = "gameOver.html"; // Back to lobby noob
        }

        updateState();
    }

    async function askOracle() {
        const res = await fetch('/api/hint', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ url: 'http://127.0.0.1:6969/api/adminPlay' })  
        });
        const data = await res.json();
        alert(data.msg);
        updateState();
    }

    updateState();
</script>
</body>
</html>

<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Media Meeting - Game Over</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: { colors: { "primary": "#3713ec", "background-light": "#f6f6f8", "background-dark": "#131022" }, fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] } },
            },
        }
    </script>
    <style>
        .gold-text-gradient { background: linear-gradient(to bottom, #FFD700 0%, #FDB931 50%, #C6930A 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-white antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
    <div class="absolute inset-0 z-0 bg-cover bg-center" style="background-image: url('/static/images/zinada.jpeg');">
        <div class="absolute inset-0 bg-background-dark/90 mix-blend-multiply"></div>
    </div>

    <div class="layout-container relative z-20 flex h-full grow flex-col items-center justify-center p-4">
        <div class="w-full max-w-[520px] transform rounded-2xl border border-white/10 bg-[#1a172c] shadow-[0_0_50px_-12px_rgba(55,19,236,0.5)]">
            <div class="flex flex-col items-center justify-center border-b border-white/5 px-8 pt-10 pb-6 text-center">
                <div class="mb-4 flex size-16 items-center justify-center rounded-full bg-red-500/10 shadow-[0_0_15px_rgba(239,68,68,0.4)]">
                    <span class="material-symbols-outlined text-4xl text-red-500">close</span>
                </div>
                <h1 class="gold-text-gradient mb-2 text-5xl font-extrabold uppercase tracking-tight">Game Over</h1>
                <p class="text-slate-400">You couldn't make it to the meeting in time...</p>
            </div>

            <div class="grid grid-cols-2 gap-4 px-8 py-8">
                <div class="col-span-2 flex flex-col items-center justify-center gap-1 rounded-xl border border-white/5 bg-background-dark/50 p-6 shadow-inner">
                    <span class="text-sm font-medium uppercase tracking-widest text-slate-400">Status</span>
                    <div class="flex items-baseline gap-2">
                        <span class="text-3xl font-black text-red-500 tracking-tight">WASTED</span>
                    </div>
                </div>
            </div>

            <div class="px-8 py-4">
                <img src="/static/images/gameOver.jpg" alt="Additional Image" class="w-full rounded-xl">
            </div>

            <div class="flex flex-col gap-3 border-t border-white/5 bg-[#151225] px-8 py-8 rounded-b-2xl">
                <button onclick="playAgain()" class="group relative flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl bg-primary py-4 text-base font-bold text-white shadow-lg transition-all hover:bg-primary/90 hover:-translate-y-0.5">
                    <span class="material-symbols-outlined mr-2">replay</span>
                    Try Again
                </button>
                
                <div class="mt-4 flex justify-center">
                    <button onclick="logout()" class="flex items-center gap-1 text-xs font-semibold text-slate-500 transition-colors hover:text-red-400">
                        <span class="material-symbols-outlined text-sm">logout</span>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function playAgain() {
        window.location.href = 'game.html';
    }

    function logout() {
        document.cookie = 'token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
